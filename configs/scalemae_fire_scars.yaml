# Cell: Scale-MAE fMoW-RGB x FireScars (binary segmentation, HLS 6B)
# Scale-MAE is RGB-native, so *_bandsel methods select target bands closest to
# fMoW/ImageNet RGB order: red, green, blue.

backbone: scalemae_fmow_rgb
dataset: fire_scars
seed: 42

epochs: 10
batch_size: 8
img_size: 224
crop_size: 224
pad_multiple: 16
eval_metric: miou


class_weighting:
  scheme: inverse_frequency
  absent_class_weight: 0.0
  max_ratio: null
  binary_minority_boost: 2.0

dice:
  class_mode: foreground
  include_background: false

stlora:
  purity_tau: 0.8
