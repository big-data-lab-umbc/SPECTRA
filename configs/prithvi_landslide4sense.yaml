# Cell: Prithvi-EO-2.0 x Landslide4Sense (binary segmentation, S2+DEM 14B)
# Cross-sensor/prospective cell: 14 input channels versus 6-band HLS pretraining.

backbone: prithvi_eo_v2_600
dataset: landslide4sense
seed: 42

epochs: 50
batch_size: 8
img_size: 128
crop_size: 128
eval_metric: miou


class_weighting:
  scheme: inverse_frequency
  absent_class_weight: 0.0
  max_ratio: null
  binary_minority_boost: 2.0

dice:
  class_mode: foreground
  include_background: false


stlora:
  purity_tau: 0.8
